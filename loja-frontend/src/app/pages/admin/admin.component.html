<section class="admin-area">
  <header>
    <h3>{{ isEditando ? 'Atualizar Veículo' : 'Novo Cadastro' }}</h3>
  </header>
  <form (submit)="onSalvar()" class="form-motors">
    <input [(ngModel)]="novoCarro.marca" name="marca" placeholder="Marca" required>
    <input [(ngModel)]="novoCarro.modelo" name="modelo" placeholder="Modelo" required>
    
    <select [(ngModel)]="novoCarro.categoria" name="cat" class="input-select" required>
      <option value="">Selecione a Categoria</option>
      <option value="caminhonete">Caminhonete</option>
      <option value="suv">SUV</option>
      <option value="sedan">Sedan</option>
      <option value="hatch">Hatch</option>
    </select>
    
    <input [(ngModel)]="novoCarro.preco" name="preco" type="number" placeholder="Preço" required>
    <textarea [(ngModel)]="novoCarro.descricao" name="desc" placeholder="Descrição"></textarea>
    
    <footer class="btns-row">
      <button type="button" (click)="onCancelar()" class="secondary">Cancelar</button>
      <button type="submit" class="primary">Salvar Veículo</button>
    </footer>
  </form>
</section>
