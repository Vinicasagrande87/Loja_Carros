<main>
  <app-header 
    [view]="view" 
    [isAdmin]="isAdmin" 
    (navigate)="onNavigate($event)">
  </app-header>

  <div class="container main-content">
    
    <app-home 
      *ngIf="view === 'home'" 
      (verEstoque)="onNavigate('estoque')">
    </app-home>

    <app-estoque 
      *ngIf="view === 'estoque'" 
      [carros]="carrosExibidos" 
      [isAdmin]="isAdmin"
      (filtrar)="onFilter($event)"
      (editarCarro)="editar($event)"
      (excluirCarro)="excluir($event)">
    </app-estoque>

    <app-admin 
      *ngIf="view === 'admin'" 
      [novoCarro]="novoCarro" 
      [isEditando]="isEditando"
      (salvar)="salvar()"
      (cancelar)="cancelar()">
    </app-admin>

    <app-contatos 
      *ngIf="view === 'contatos'">
    </app-contatos>

  </div>

  <app-footer></app-footer>

  <button *ngIf="!isAdmin" class="admin-float" (click)="acessoAdmin()" title="Acesso Restrito">
    🔐
  </button>
</main>
